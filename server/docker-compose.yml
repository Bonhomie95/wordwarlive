services:
  postgres:
    image: postgres:16-alpine
    container_name: wordwar-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: wordwar
      POSTGRES_PASSWORD: wordwar
      POSTGRES_DB: wordwar
    ports:
      - "5432:5432"
    volumes:
      - wordwar_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wordwar -d wordwar"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: wordwar-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - wordwar_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  wordwar_pg:
  wordwar_redis:
